events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  resolver 127.0.0.11 ipv6=off valid=10s;

  sendfile on;
  keepalive_timeout 65;

  server {
    listen 8088;
    server_name _;

    auth_basic "Observability";
    auth_basic_user_file /etc/nginx/auth/.htpasswd;

    location = / {
      set $grafana_upstream grafana:3000;
      proxy_pass http://$grafana_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_redirect off;
    }

    location /prometheus/ {
      set $prometheus_upstream prometheus:9090;
      proxy_pass http://$prometheus_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /prometheus;
      proxy_redirect off;
    }

    location /alertmanager/ {
      set $alertmanager_upstream alertmanager:9093;
      proxy_pass http://$alertmanager_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-Prefix /alertmanager;
      proxy_redirect off;
    }
  }
}