name: DB Migrations (manual)

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  migrate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: crm_disacuna
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/crm_disacuna
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd backend
          npm ci
      - name: Prepare database schema
        run: |
          cd backend
          npm run db:prepare
      - name: Run role migration
        run: |
          cd backend
          npm run db:migrate:roles
      - name: Seed staff users (optional)
        if: github.event_name == 'workflow_dispatch'
        run: |
          cd backend
          npm run db:seed:staff
