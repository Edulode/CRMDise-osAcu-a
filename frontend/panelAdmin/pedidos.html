<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos | Diseños Acuña</title>
  <script src="../src/js/auth.js" defer></script>
  <script src="../src/js/confirm-dialog.js" defer></script>
  <script defer>
    window.addEventListener('DOMContentLoaded', () => {
      if (!AUTH.isAuthenticated() || !['admin', 'gerente', 'colaborador'].includes(AUTH.getUser()?.role)) {
        window.location.href = './login.html';
      }
    });
  </script>
  <link href="../src/css/output.css" rel="stylesheet" />
  <script src="../src/css/sidebar.js" data-active="pedidos" defer></script>
  <style>
    :root {
      --gold: #c9a84c;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --danger: #dc2626;
      --ok: #15803d;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: #f3f4f6;
              ${o.status !== 'completed' && o.status !== 'canceled' ? `<button class="btn btn-success" type="button" onclick="completeOrder('${o.id}')">Completar</button>` : ''}
      color: var(--text);
    }

    .page-shell {
      min-height: 100vh;
      padding: 20px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      color: #1f2f4a;
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      padding: 9px 13px;
    }

    .btn:hover { border-color: var(--gold); }
    .btn-danger { border-color: #fecaca; color: var(--danger); }
    .btn-success { border-color: #bbf7d0; color: #15803d; background: #f0fdf4; }
    .btn-success:hover { border-color: #86efac; background: #dcfce7; }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
    }

    .kpi-card {
      padding: 14px;
      border-top: 4px solid var(--gold);
    }

    .kpi-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .kpi-value {
      margin: 8px 0 0;
      font-size: 1.95rem;
      font-weight: 800;
      color: #111827;
    }

    .panel {
      padding: 14px;
    }

    .filters {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input,
    .select {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      background: #fff;
      font: inherit;
      color: var(--text);
      width: 100%;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
    }

    th {
      text-align: left;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
    }

    td {
      padding: 10px 8px;
      border-bottom: 1px solid #eef2f7;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    tr:hover td { background: #fafaf9; }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      padding: 0.18rem 0.6rem;
      font-size: 0.74rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .b-pending { background: #fef3c7; color: #a16207; }
    .b-paid { background: #dcfce7; color: var(--ok); }
    .b-in_production { background: #dbeafe; color: #1d4ed8; }
    .b-shipped { background: #ede9fe; color: #6d28d9; }
    .b-completed { background: #dcfce7; color: var(--ok); }
    .b-canceled { background: #fee2e2; color: #b91c1c; }

    .status-select {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 0.82rem;
      background: #fff;
    }

    .stock-hint {
      margin-top: 6px;
      min-height: 1.1rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .stock-hint.low {
      color: #b45309;
      font-weight: 700;
    }

    .stock-hint.error {
      color: var(--danger);
      font-weight: 700;
    }

    .empty {
      padding: 22px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    #orderModalOverlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 70;
      padding: 12px;
    }

    #orderModalOverlay.open { display: flex; }

    .order-modal-box {
      width: min(640px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .order-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .order-form-grid .full { grid-column: 1 / -1; }

    #detailOverlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      padding: 12px;
    }

    #detailOverlay.open { display: flex; }

    .detail-box {
      width: min(860px, 100%);
      max-height: 88vh;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .detail-item {
      background: #f8fafc;
      border: 1px solid #edf2f7;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 0.85rem;
    }

    .detail-item strong {
      display: block;
      color: var(--muted);
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .history {
      border: 1px solid #edf2f7;
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      display: grid;
      gap: 8px;
    }

    .history-row {
      border: 1px solid #eef2f7;
      border-radius: 8px;
      padding: 8px;
      font-size: 0.82rem;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    #toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 1200;
      min-width: 240px;
      max-width: 420px;
      border-radius: 10px;
      padding: 10px 12px;
      color: #fff;
      font-size: 0.84rem;
      font-weight: 600;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.22);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #toast.success { background: #15803d; }
    #toast.error { background: #b91c1c; }

    @media (max-width: 1100px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filters { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 700px) {
      .page-shell { padding: 14px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <div class="toolbar">
      <h1>Pedidos</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button id="createOrderBtn" type="button" class="btn">Nuevo pedido</button>
        <button id="refreshBtn" type="button" class="btn">Actualizar</button>
      </div>
    </div>

    <section class="kpi-grid">
      <article class="card kpi-card"><p class="kpi-label">Total</p><p class="kpi-value" id="kpiTotal">0</p></article>
      <article class="card kpi-card"><p class="kpi-label">Pendientes</p><p class="kpi-value" id="kpiPending">0</p></article>
      <article class="card kpi-card"><p class="kpi-label">En Producción</p><p class="kpi-value" id="kpiProd">0</p></article>
      <article class="card kpi-card"><p class="kpi-label">Ventas</p><p class="kpi-value" id="kpiSales">$0</p></article>
    </section>

    <section class="card panel">
      <div class="filters">
        <input id="searchInput" class="input" type="text" placeholder="Buscar código o cliente" />
        <select id="statusFilter" class="select">
          <option value="">Todos los estados</option>
          <option value="pending">Pendiente</option>
          <option value="paid">Pagado</option>
          <option value="in_production">En producción</option>
          <option value="shipped">Enviado</option>
          <option value="completed">Completado</option>
          <option value="canceled">Cancelado</option>
        </select>
        <select id="sortFilter" class="select">
          <option value="new">Más recientes</option>
          <option value="old">Más antiguos</option>
          <option value="total_desc">Mayor total</option>
          <option value="total_asc">Menor total</option>
        </select>
        <div id="resultCount" style="display:flex;align-items:center;color:#6b7280;font-size:0.84rem;">0 resultados</div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Código</th>
              <th>Cliente</th>
              <th>Estado</th>
              <th>Total</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
        <div id="emptyState" class="empty" style="display:none;">No hay pedidos para los filtros actuales.</div>
      </div>
    </section>
  </main>

  <div id="orderModalOverlay" aria-hidden="true">
    <div class="order-modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;">
        <h3 id="orderModalTitle" style="margin:0;font-size:1.05rem;font-weight:800;color:#1f2f4a;">Nuevo pedido</h3>
        <button id="closeOrderModalBtn" class="btn" type="button">Cerrar</button>
      </div>
      <form id="orderForm" class="order-form-grid">
        <div>
          <label for="orderCustomer" style="display:block;font-size:0.82rem;color:#475569;margin-bottom:4px;">Cliente</label>
          <select id="orderCustomer" class="select" required></select>
        </div>
        <div>
          <label for="orderDesign" style="display:block;font-size:0.82rem;color:#475569;margin-bottom:4px;">Diseño</label>
          <select id="orderDesign" class="select" required></select>
          <div id="orderStockHint" class="stock-hint">Selecciona un diseño para ver el stock disponible.</div>
        </div>
        <div>
          <label for="orderQuantity" style="display:block;font-size:0.82rem;color:#475569;margin-bottom:4px;">Cantidad</label>
          <input id="orderQuantity" class="input" type="number" min="1" step="1" value="1" required />
        </div>
        <div>
          <label for="orderShipping" style="display:block;font-size:0.82rem;color:#475569;margin-bottom:4px;">Envío</label>
          <input id="orderShipping" class="input" type="number" min="0" step="0.01" value="0" required />
        </div>
        <div>
          <label for="orderStatus" style="display:block;font-size:0.82rem;color:#475569;margin-bottom:4px;">Estado</label>
          <select id="orderStatus" class="select">
            <option value="pending">Pendiente</option>
            <option value="paid">Pagado</option>
            <option value="in_production">En producción</option>
            <option value="shipped">Enviado</option>
            <option value="completed">Completado</option>
            <option value="canceled">Cancelado</option>
          </select>
        </div>
        <div class="full">
          <label for="orderNotes" style="display:block;font-size:0.82rem;color:#475569;margin-bottom:4px;">Notas</label>
          <textarea id="orderNotes" class="input" rows="3" placeholder="Notas internas del pedido"></textarea>
        </div>
        <div class="full" style="display:flex;justify-content:flex-end;gap:8px;">
          <button type="button" class="btn" id="cancelOrderFormBtn">Cancelar</button>
          <button type="submit" class="btn">Guardar pedido</button>
        </div>
      </form>
    </div>
  </div>

  <div id="detailOverlay" aria-hidden="true">
    <div class="detail-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;">
        <h3 id="detailTitle" style="margin:0;font-size:1.05rem;font-weight:800;color:#1f2f4a;">Detalle</h3>
        <button id="closeDetailBtn" class="btn" type="button">Cerrar</button>
      </div>
      <div id="detailMeta" class="detail-grid"></div>
      <h4 style="margin:10px 0 6px;font-size:0.86rem;color:#334155;">Items</h4>
      <div id="detailItems" class="history"></div>
      <h4 style="margin:10px 0 6px;font-size:0.86rem;color:#334155;">Historial</h4>
      <div id="detailHistory" class="history"></div>
    </div>
  </div>

  <div id="toast" role="alert" aria-live="polite"></div>

  <script>
    const API_BASE = '/api';
    const STATUS_LABEL = {
      pending: 'Pendiente',
      paid: 'Pagado',
      in_production: 'En producción',
      shipped: 'Enviado',
      completed: 'Completado',
      canceled: 'Cancelado',
    };

    let orders = [];
    let customers = [];
    let designs = [];
    let designsById = new Map();
    let orderFormMode = 'create';
    let editingOrderId = null;
    let toastTimer;

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.className = type;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 3200);
    }

    function ensureAdmin() {
      if (!AUTH.isAuthenticated() || !['admin', 'gerente', 'colaborador'].includes(AUTH.getUser()?.role)) {
        window.location.href = './login.html';
        return false;
      }
      return true;
    }

    function money(v) {
      return '$' + Number(v || 0).toLocaleString('es-MX', { minimumFractionDigits: 2 });
    }

    function badgeClass(status) {
      return 'b-' + (status || 'pending');
    }

    async function fetchJson(endpoint, options = {}) {
      const response = await fetch(API_BASE + endpoint, {
        ...options,
        headers: {
          ...AUTH.getHeaders(),
          ...(options.headers || {}),
        },
      });
      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(body.message || 'Error de comunicación con el servidor');
      }
      return body;
    }

    async function loadOrders() {
      const result = await fetchJson('/orders');
      orders = result.data || [];
      renderKpis();
      renderTable();
    }

    async function loadReferenceData() {
      const [customersResult, designsResult] = await Promise.allSettled([
        fetchJson('/customers'),
        fetchJson('/catalog/designs?limit=100'),
      ]);

      if (customersResult.status === 'fulfilled') {
        customers = customersResult.value.data || [];
      }

      if (designsResult.status === 'fulfilled') {
        designs = designsResult.value.data || [];
      }

      designsById = new Map(designs.map((design) => [design.id, design]));
      hydrateOrderFormSelects();
      updateStockHint();

      if (customersResult.status === 'rejected' && designsResult.status === 'rejected') {
        throw new Error('No se pudieron cargar clientes ni diseños');
      }
    }

    function hydrateOrderFormSelects() {
      const customerSelect = document.getElementById('orderCustomer');
      const designSelect = document.getElementById('orderDesign');

      customerSelect.innerHTML = customers.length
        ? customers.map((customer) => `<option value="${customer.id}">${customer.full_name} (${customer.email})</option>`).join('')
        : '<option value="">Sin clientes disponibles</option>';

      designSelect.innerHTML = designs.length
        ? designs.map((design) => `<option value="${design.id}">${design.name} - ${money(design.base_price)} · stock ${Number(design.stock ?? 0)}</option>`).join('')
        : '<option value="">Sin diseños disponibles</option>';
    }

    function updateStockHint() {
      const hint = document.getElementById('orderStockHint');
      if (!hint) return;

      const designId = document.getElementById('orderDesign').value;
      const quantity = Number(document.getElementById('orderQuantity').value || 0);
      const selected = designsById.get(designId);

      if (!selected) {
        hint.className = 'stock-hint';
        hint.textContent = 'Selecciona un diseño para ver el stock disponible.';
        return;
      }

      const available = Number(selected.stock ?? 0);
      const reserved = Number(selected.reserved ?? 0);

      if (available <= 0) {
        hint.className = 'stock-hint error';
        hint.textContent = `Sin stock disponible para ${selected.name}.`;
        return;
      }

      if (quantity > available) {
        hint.className = 'stock-hint error';
        hint.textContent = `Solo hay ${available} unidades disponibles para ${selected.name}.`;
        return;
      }

      if (available <= 3) {
        hint.className = 'stock-hint low';
        hint.textContent = `Alerta: quedan ${available} unidades disponibles para ${selected.name}.`;
        return;
      }

      hint.className = 'stock-hint';
      hint.textContent = `Disponible: ${available} unidades · Reservadas: ${reserved}`;
    }

    function renderKpis() {
      const pending = orders.filter((o) => o.status === 'pending').length;
      const inProd = orders.filter((o) => o.status === 'in_production').length;
      const sales = orders.reduce((sum, o) => sum + Number(o.total_amount || 0), 0);

      document.getElementById('kpiTotal').textContent = String(orders.length);
      document.getElementById('kpiPending').textContent = String(pending);
      document.getElementById('kpiProd').textContent = String(inProd);
      document.getElementById('kpiSales').textContent = money(sales);
    }

    function getFilteredOrders() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const status = document.getElementById('statusFilter').value;
      const sortBy = document.getElementById('sortFilter').value;

      const filtered = orders.filter((o) => {
        const code = String(o.order_code || '').toLowerCase();
        const customer = String(o.customer_name || o.customer_email || '').toLowerCase();
        const matchQuery = !query || code.includes(query) || customer.includes(query);
        const matchStatus = !status || o.status === status;
        return matchQuery && matchStatus;
      });

      filtered.sort((a, b) => {
        if (sortBy === 'old') return new Date(a.created_at) - new Date(b.created_at);
        if (sortBy === 'total_desc') return Number(b.total_amount || 0) - Number(a.total_amount || 0);
        if (sortBy === 'total_asc') return Number(a.total_amount || 0) - Number(b.total_amount || 0);
        return new Date(b.created_at) - new Date(a.created_at);
      });

      return filtered;
    }

    function renderTable() {
      const filtered = getFilteredOrders();
      document.getElementById('resultCount').textContent = filtered.length + ' resultados';

      const body = document.getElementById('ordersBody');
      const empty = document.getElementById('emptyState');

      if (!filtered.length) {
        body.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      body.innerHTML = filtered.map((o) => {
        const created = new Date(o.created_at).toLocaleDateString('es-MX');
        return `
          <tr>
            <td><button class="btn" type="button" onclick="openDetail('${o.id}')"><span class="mono">${o.order_code}</span></button></td>
            <td>${o.customer_name || o.customer_email || '-'}</td>
            <td>
              <span class="badge ${badgeClass(o.status)}">${STATUS_LABEL[o.status] || o.status}</span>
              <select class="status-select" onchange="changeStatus('${o.id}', this.value)">
                ${Object.keys(STATUS_LABEL).map((s) => `<option value="${s}" ${s === o.status ? 'selected' : ''}>${STATUS_LABEL[s]}</option>`).join('')}
              </select>
            </td>
            <td><strong>${money(o.total_amount)}</strong></td>
            <td>${created}</td>
            <td>
              <button class="btn" type="button" onclick="openOrderModalEdit('${o.id}')">Editar</button>
              ${o.status !== 'completed' && o.status !== 'canceled' ? `<button class="btn btn-success" type="button" onclick="completeOrder('${o.id}')">Completar</button>` : ''}
              <button class="btn btn-danger" type="button" onclick="cancelOrder('${o.id}')">Cancelar</button>
            </td>
          </tr>
        `;
      }).join('');
    }

    async function changeStatus(orderId, status) {
      try {
        await fetchJson(`/orders/${orderId}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status }),
        });
        await loadOrders();
        showToast('Estado actualizado correctamente.');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function completeOrder(orderId) {
      try {
        await fetchJson(`/orders/${orderId}/status`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: 'completed', notes: 'Marcado como completado desde panel admin' }),
        });
        await loadOrders();
        showToast('Pedido marcado como completado.');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function cancelOrder(orderId) {
      const confirmed = await APP_CONFIRM_DANGER({
        title: 'Cancelar pedido',
        message: 'Vas a cancelar este pedido y su estado cambiará a cancelado.',
        details: 'Esta acción quedará registrada en el historial del pedido.',
        confirmText: 'Cancelar pedido',
      });
      if (!confirmed) return;
      try {
        await fetchJson(`/orders/${orderId}`, { method: 'DELETE' });
        await loadOrders();
        showToast('Pedido cancelado correctamente.');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    function closeOrderModal() {
      document.getElementById('orderModalOverlay').classList.remove('open');
      editingOrderId = null;
      orderFormMode = 'create';
      document.getElementById('orderForm').reset();
      document.getElementById('orderCustomer').disabled = false;
      document.getElementById('orderDesign').disabled = false;
      document.getElementById('orderQuantity').disabled = false;
      document.getElementById('orderStatus').value = 'pending';
      updateStockHint();
    }

    function openOrderModalCreate() {
      orderFormMode = 'create';
      editingOrderId = null;
      document.getElementById('orderModalTitle').textContent = 'Nuevo pedido';
      document.getElementById('orderCustomer').disabled = false;
      document.getElementById('orderDesign').disabled = false;
      document.getElementById('orderQuantity').disabled = false;
      document.getElementById('orderStatus').value = 'pending';
      updateStockHint();
      document.getElementById('orderModalOverlay').classList.add('open');
    }

    async function openOrderModalEdit(orderId) {
      try {
        const detail = await fetchJson(`/orders/${orderId}`);
        const order = detail.data;
        const firstItem = (order.items || [])[0] || {};

        orderFormMode = 'edit';
        editingOrderId = orderId;
        document.getElementById('orderModalTitle').textContent = `Editar pedido ${order.order_code}`;
        document.getElementById('orderCustomer').value = order.customer_id || '';
        document.getElementById('orderDesign').value = firstItem.design_id || '';
        document.getElementById('orderQuantity').value = firstItem.quantity || 1;
        document.getElementById('orderShipping').value = Number(order.shipping_amount || 0);
        document.getElementById('orderStatus').value = order.status || 'pending';
        document.getElementById('orderNotes').value = order.notes || '';

        document.getElementById('orderCustomer').disabled = true;
        document.getElementById('orderDesign').disabled = true;
        document.getElementById('orderQuantity').disabled = true;
        updateStockHint();

        document.getElementById('orderModalOverlay').classList.add('open');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    async function saveOrderFromModal(event) {
      event.preventDefault();

      const customerId = document.getElementById('orderCustomer').value;
      const designId = document.getElementById('orderDesign').value;
      const quantity = Number(document.getElementById('orderQuantity').value || 0);
      const shippingAmount = Number(document.getElementById('orderShipping').value || 0);
      const status = document.getElementById('orderStatus').value;
      const notes = document.getElementById('orderNotes').value.trim();
      const selectedDesign = designsById.get(designId);
      const availableStock = Number(selectedDesign?.stock ?? 0);

      if (orderFormMode === 'create' && (!customerId || !designId || quantity <= 0)) {
        showToast('Completa cliente, diseño y cantidad.', 'error');
        return;
      }

      if (orderFormMode === 'create' && selectedDesign && quantity > availableStock) {
        showToast(`Solo hay ${availableStock} unidades disponibles para ${selectedDesign.name}.`, 'error');
        updateStockHint();
        return;
      }

      try {
        if (orderFormMode === 'create') {
          const created = await fetchJson('/orders/checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              customerId,
              items: [{
                designId,
                quantity,
                personalizationData: {},
              }],
              shippingPrice: shippingAmount,
              notes: notes || undefined,
            }),
          });

          if (status !== 'pending' && created?.data?.id) {
            await fetchJson(`/orders/${created.data.id}/status`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                status,
                notes: notes || 'Actualizado desde panel admin',
              }),
            });
          }
        } else {
          await fetchJson(`/orders/${editingOrderId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              shippingAmount,
              status,
              notes: notes || null,
            }),
          });
        }

        const successMode = orderFormMode;
        closeOrderModal();
        await loadOrders();
        showToast(successMode === 'create' ? 'Pedido creado correctamente.' : 'Pedido actualizado correctamente.');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    function closeDetail() {
      document.getElementById('detailOverlay').classList.remove('open');
    }

    async function openDetail(orderId) {
      try {
        const [detail, history] = await Promise.all([
          fetchJson(`/orders/${orderId}`),
          fetchJson(`/orders/${orderId}/history`),
        ]);

        const order = detail.data;
        const events = history.data || [];

        document.getElementById('detailTitle').textContent = 'Pedido ' + (order.order_code || '');

        document.getElementById('detailMeta').innerHTML = `
          <div class="detail-item"><strong>Cliente</strong>${order.customer_name || '-'}</div>
          <div class="detail-item"><strong>Email</strong>${order.customer_email || '-'}</div>
          <div class="detail-item"><strong>Estado</strong>${STATUS_LABEL[order.status] || order.status}</div>
          <div class="detail-item"><strong>Fecha</strong>${new Date(order.created_at).toLocaleString('es-MX')}</div>
          <div class="detail-item"><strong>Subtotal</strong>${money(order.subtotal_amount)}</div>
          <div class="detail-item"><strong>Total</strong>${money(order.total_amount)}</div>
        `;

        const items = order.items || [];
        document.getElementById('detailItems').innerHTML = items.length
          ? items.map((item) => `
              <div class="history-row">
                <div><strong>${item.design_name || 'Diseño'}</strong><div>${item.quantity} x ${money(item.total_price)}</div></div>
                <div>${money(item.total_price)}</div>
              </div>
            `).join('')
          : '<div class="empty">Sin items.</div>';

        document.getElementById('detailHistory').innerHTML = events.length
          ? events.map((e) => `
              <div class="history-row">
                <div>${STATUS_LABEL[e.from_status] || e.from_status || 'inicio'} -> ${STATUS_LABEL[e.to_status] || e.to_status}</div>
                <div>${new Date(e.created_at).toLocaleString('es-MX')}</div>
              </div>
            `).join('')
          : '<div class="empty">Sin historial.</div>';

        document.getElementById('detailOverlay').classList.add('open');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    window.changeStatus = changeStatus;
    window.completeOrder = completeOrder;
    window.cancelOrder = cancelOrder;
    window.openDetail = openDetail;
    window.openOrderModalEdit = openOrderModalEdit;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!ensureAdmin()) return;

      document.getElementById('createOrderBtn').addEventListener('click', openOrderModalCreate);
      document.getElementById('closeOrderModalBtn').addEventListener('click', closeOrderModal);
      document.getElementById('cancelOrderFormBtn').addEventListener('click', closeOrderModal);
      document.getElementById('orderForm').addEventListener('submit', saveOrderFromModal);
      document.getElementById('orderModalOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'orderModalOverlay') {
          closeOrderModal();
        }
      });

      document.getElementById('refreshBtn').addEventListener('click', async () => {
        try {
          await loadOrders();
          showToast('Lista de pedidos actualizada.');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });

      document.getElementById('searchInput').addEventListener('input', renderTable);
      document.getElementById('statusFilter').addEventListener('change', renderTable);
      document.getElementById('sortFilter').addEventListener('change', renderTable);
      document.getElementById('closeDetailBtn').addEventListener('click', closeDetail);
      document.getElementById('detailOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'detailOverlay') closeDetail();
      });
      document.getElementById('orderDesign').addEventListener('change', updateStockHint);
      document.getElementById('orderQuantity').addEventListener('input', updateStockHint);

      try {
        await loadReferenceData();
        await loadOrders();
      } catch (error) {
        showToast(error.message, 'error');
      }
    });
  </script>
</body>
</html>
