<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diseños Acuña - Dashboard</title>

  <script src="../src/js/auth.js" defer></script>
  <script defer>
    window.addEventListener('DOMContentLoaded', () => {
      if (!AUTH.isAuthenticated() || !['admin', 'gerente', 'colaborador'].includes(AUTH.getUser()?.role)) {
        window.location.href = './login.html';
      }
    });
  </script>

  <link href="../src/css/output.css" rel="stylesheet" />
  <script src="../src/css/sidebar.js" data-active="dashboard" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    :root {
      --gold: #c9a84c;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --bg: #f3f4f6;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
    }

    .page-shell {
      padding: 20px;
      min-height: 100vh;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }

    .toolbar h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      color: #1f2f4a;
    }

    .btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .btn:hover { border-color: var(--gold); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.05);
    }

    .kpi-card {
      padding: 14px;
      border-top: 4px solid var(--gold);
    }

    .kpi-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    .kpi-value {
      margin: 8px 0 0;
      font-size: 2rem;
      font-weight: 800;
      color: #111827;
    }

    .chart-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      align-items: start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel {
      padding: 14px;
      overflow: hidden;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.05rem;
      font-weight: 800;
      color: #1f2f4a;
    }

    .chart-box {
      position: relative;
      width: 100%;
      height: 300px;
      min-height: 300px;
      max-height: 300px;
      overflow: hidden;
    }

    .chart-box.short {
      height: 300px;
      min-height: 300px;
      max-height: 300px;
    }

    .chart-box canvas {
      position: absolute;
      inset: 0;
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      max-height: 100% !important;
      display: block;
    }

    .orders-card { padding: 14px; }

    .orders-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .orders-head h2 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
      color: #1f2f4a;
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th {
      text-align: left;
      color: var(--muted);
      text-transform: uppercase;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 10px 8px;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 8px;
      border-bottom: 1px solid #eef2f7;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      padding: 0.18rem 0.6rem;
      font-size: 0.74rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge-warning { background: #fef3c7; color: #a16207; }
    .badge-success { background: #dcfce7; color: #15803d; }
    .badge-info { background: #e0f2fe; color: #0369a1; }
    .badge-neutral { background: #ede9fe; color: #6d28d9; }
    .badge-danger { background: #fee2e2; color: #b91c1c; }

    #toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 1200;
      min-width: 240px;
      max-width: 420px;
      border-radius: 10px;
      padding: 10px 12px;
      color: #fff;
      font-size: 0.84rem;
      font-weight: 600;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.22);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #toast.success { background: #15803d; }
    #toast.error { background: #b91c1c; }

    @media (max-width: 1200px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .chart-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page-shell { padding: 14px; }
      .toolbar h1 { font-size: 1.6rem; }
      .kpi-grid { grid-template-columns: 1fr; }
      .chart-box, .chart-box.short {
        height: 260px;
        min-height: 260px;
        max-height: 260px;
      }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <div class="toolbar">
      <h1>Dashboard</h1>
      <button id="refreshBtn" class="btn" type="button">Actualizar</button>
    </div>

    <section class="kpi-grid">
      <article class="card kpi-card">
        <p class="kpi-label">Ventas hoy</p>
        <p class="kpi-value" id="kpiSalesToday">$0</p>
      </article>
      <article class="card kpi-card">
        <p class="kpi-label">Ventas semana</p>
        <p class="kpi-value" id="kpiSalesWeek">$0</p>
      </article>
      <article class="card kpi-card">
        <p class="kpi-label">Órdenes pendientes</p>
        <p class="kpi-value" id="kpiPending">0</p>
      </article>
      <article class="card kpi-card">
        <p class="kpi-label">Clientes únicos</p>
        <p class="kpi-value" id="kpiCustomers">0</p>
      </article>
    </section>

    <section class="chart-grid">
      <article class="card panel">
        <h2>Ventas últimos 7 días</h2>
        <div class="chart-box">
          <canvas id="salesChart" width="1200" height="300"></canvas>
        </div>
      </article>

      <article class="card panel">
        <h2>Estados</h2>
        <div class="chart-box short">
          <canvas id="statusChart" width="1200" height="300"></canvas>
        </div>
      </article>
    </section>

    <section class="card orders-card">
      <div class="orders-head">
        <h2>Pedidos recientes</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Pedido</th>
              <th>Cliente</th>
              <th>Fecha</th>
              <th>Estado</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="ordersBody">
            <tr><td colspan="5">Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="toast" role="alert" aria-live="polite"></div>

  <script>
    const API_BASE = '/api';
    let salesChart = null;
    let statusChart = null;
    let toastTimer;

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.className = type;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 3200);
    }

    const STATUS_META = {
      pending: { label: 'Pendiente', className: 'badge-warning' },
      paid: { label: 'Pagado', className: 'badge-success' },
      in_production: { label: 'Producción', className: 'badge-info' },
      shipped: { label: 'Enviado', className: 'badge-neutral' },
      completed: { label: 'Completado', className: 'badge-success' },
      canceled: { label: 'Cancelado', className: 'badge-danger' },
    };

    function ensureAdmin() {
      if (!AUTH.isAuthenticated() || !['admin', 'gerente', 'colaborador'].includes(AUTH.getUser()?.role)) {
        window.location.href = './login.html';
        return false;
      }
      return true;
    }

    function money(v) {
      return '$' + Number(v || 0).toLocaleString('es-MX', { minimumFractionDigits: 0 });
    }

    function badgeFor(status) {
      const meta = STATUS_META[status] || STATUS_META.pending;
      return '<span class="badge ' + meta.className + '">' + meta.label + '</span>';
    }

    function getLast7DaysMap() {
      const map = {};
      for (let i = 6; i >= 0; i -= 1) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        map[d.toISOString().slice(0, 10)] = 0;
      }
      return map;
    }

    function paintCharts(dayMap, statusCounts) {
      const salesCanvas = document.getElementById('salesChart');
      salesCanvas.width = salesCanvas.parentElement?.clientWidth || 1200;
      salesCanvas.height = 300;
      salesCanvas.style.width = '100%';
      salesCanvas.style.height = '300px';

      const statusCanvas = document.getElementById('statusChart');
      statusCanvas.width = statusCanvas.parentElement?.clientWidth || 1200;
      statusCanvas.height = 300;
      statusCanvas.style.width = '100%';
      statusCanvas.style.height = '300px';

      if (salesChart) salesChart.destroy();
      if (statusChart) statusChart.destroy();

      const labels = Object.keys(dayMap).map((d) => {
        const date = new Date(d + 'T00:00:00');
        return date.toLocaleDateString('es-MX', { day: '2-digit', month: 'short' });
      });
      const values = Object.values(dayMap);

      salesChart = new Chart(salesCanvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'Ventas',
            data: values,
            borderColor: '#c9a84c',
            backgroundColor: 'rgba(201, 168, 76, 0.12)',
            fill: true,
            tension: 0.35,
            pointRadius: 4,
            pointHoverRadius: 6,
          }],
        },
        options: {
          responsive: false,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { display: false } },
            y: { beginAtZero: true },
          },
        },
      });

      statusChart = new Chart(statusCanvas, {
        type: 'doughnut',
        data: {
          labels: ['Pend', 'Pag', 'Prod', 'Env', 'Comp', 'Canc'],
          datasets: [{
            data: [
              statusCounts.pending,
              statusCounts.paid,
              statusCounts.in_production,
              statusCounts.shipped,
              statusCounts.completed,
              statusCounts.canceled,
            ],
            backgroundColor: ['#f59e0b', '#10b981', '#3b82f6', '#8b5cf6', '#16a34a', '#dc2626'],
          }],
        },
        options: {
          responsive: false,
          maintainAspectRatio: false,
          cutout: '65%',
          plugins: { legend: { position: 'top' } },
        },
      });
    }

    function paintTable(orders) {
      const body = document.getElementById('ordersBody');
      if (!orders.length) {
        body.innerHTML = '<tr><td colspan="5">Sin órdenes registradas.</td></tr>';
        return;
      }

      body.innerHTML = orders.slice(0, 8).map((o) => {
        const date = new Date(o.created_at).toLocaleDateString('es-MX');
        return '<tr>' +
          '<td><strong>' + (o.order_code || '-') + '</strong></td>' +
          '<td>' + (o.customer_name || o.customer_email || 'Cliente') + '</td>' +
          '<td>' + date + '</td>' +
          '<td>' + badgeFor(o.status) + '</td>' +
          '<td><strong>' + money(o.total_amount) + '</strong></td>' +
        '</tr>';
      }).join('');
    }

    async function loadDashboard() {
      const response = await fetch(API_BASE + '/orders', { headers: AUTH.getHeaders() });
      if (!response.ok) throw new Error('No se pudo cargar órdenes');

      const result = await response.json();
      const orders = result.data || [];

      const today = new Date().toISOString().slice(0, 10);
      const weekStart = new Date();
      weekStart.setDate(weekStart.getDate() - 6);

      const dayMap = getLast7DaysMap();
      const statusCounts = {
        pending: 0,
        paid: 0,
        in_production: 0,
        shipped: 0,
        completed: 0,
        canceled: 0,
      };

      let salesToday = 0;
      let salesWeek = 0;
      let pending = 0;

      orders.forEach((o) => {
        const dateKey = String(o.created_at || '').slice(0, 10);
        const total = Number(o.total_amount || 0);

        if (dateKey === today) salesToday += total;
        if (new Date(dateKey + 'T00:00:00') >= weekStart) salesWeek += total;
        if (['pending', 'paid', 'in_production'].includes(o.status)) pending += 1;

        if (statusCounts[o.status] !== undefined) {
          statusCounts[o.status] += 1;
        }

        if (dayMap[dateKey] !== undefined) {
          dayMap[dateKey] += total;
        }
      });

      document.getElementById('kpiSalesToday').textContent = money(salesToday);
      document.getElementById('kpiSalesWeek').textContent = money(salesWeek);
      document.getElementById('kpiPending').textContent = String(pending);
      document.getElementById('kpiCustomers').textContent = String(new Set(orders.map((o) => o.customer_email)).size);

      paintCharts(dayMap, statusCounts);
      paintTable(orders);
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!ensureAdmin()) return;

      document.getElementById('refreshBtn').addEventListener('click', async () => {
        try {
          await loadDashboard();
          showToast('Dashboard actualizado.');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });

      try {
        await loadDashboard();
      } catch (error) {
        showToast(error.message, 'error');
      }
    });
  </script>
</body>
</html>
