<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diseños | Diseños Acuña</title>
  <script src="../src/js/auth.js" defer></script>
  <script defer>
    window.addEventListener('DOMContentLoaded', () => {
      if (!AUTH.isAuthenticated() || AUTH.getUser()?.role !== 'admin') {
        window.location.href = './login.html';
      }
    });
  </script>
  <link href="../src/css/output.css" rel="stylesheet" />
  <script src="../src/css/sidebar.js" data-active="disenos" defer></script>
  <style>
    :root {
      --gold: #c9a84c;
      --surface: #ffffff;
      --border: #e5e7eb;
      --text: #1f2937;
      --muted: #6b7280;
      --danger: #dc2626;
      --ok: #15803d;
    }

    body {
      margin: 0;
      font-family: 'DM Sans', sans-serif;
      background: #f3f4f6;
      color: var(--text);
    }

    .page-shell {
      min-height: 100vh;
      padding: 20px;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .toolbar h1 {
      margin: 0;
      font-size: 2rem;
      font-weight: 800;
      color: #1f2f4a;
    }

    .btn {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      padding: 9px 13px;
    }

    .btn:hover { border-color: var(--gold); }
    .btn-primary { background: var(--gold); color: #1f2f4a; border-color: var(--gold); }
    .btn-danger { border-color: #fecaca; color: var(--danger); }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.04);
    }

    .kpi-card {
      padding: 14px;
      border-top: 4px solid var(--gold);
    }

    .kpi-label {
      margin: 0;
      color: var(--muted);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .kpi-value {
      margin: 8px 0 0;
      font-size: 1.95rem;
      font-weight: 800;
      color: #111827;
    }

    .panel { padding: 14px; }

    .filters {
      display: grid;
      grid-template-columns: 1.5fr 1fr auto;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input, .select, .textarea {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      background: #fff;
      font: inherit;
      color: var(--text);
      width: 100%;
    }

    .textarea { min-height: 84px; resize: vertical; }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
    }

    th {
      text-align: left;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      padding: 10px 8px;
    }

    td {
      padding: 10px 8px;
      border-bottom: 1px solid #eef2f7;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    tr:hover td { background: #fafaf9; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      padding: 0.18rem 0.6rem;
      font-size: 0.74rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .b-active { background: #dcfce7; color: var(--ok); }
    .b-inactive { background: #fee2e2; color: #b91c1c; }

    .empty {
      padding: 22px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    #formOverlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.42);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 60;
      padding: 12px;
    }

    #formOverlay.open { display: flex; }

    .form-box {
      width: min(860px, 100%);
      max-height: 90vh;
      overflow: auto;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .col-2 { grid-column: 1 / -1; }

    .label {
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 1200;
      min-width: 240px;
      max-width: 420px;
      border-radius: 10px;
      padding: 10px 12px;
      color: #fff;
      font-size: 0.84rem;
      font-weight: 600;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.22);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    #toast.success { background: #15803d; }
    #toast.error { background: #b91c1c; }

    @media (max-width: 1100px) {
      .kpi-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .filters { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 700px) {
      .page-shell { padding: 14px; }
      .kpi-grid { grid-template-columns: 1fr; }
      .filters { grid-template-columns: 1fr; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="page-shell">
    <div class="toolbar">
      <h1>Diseños</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button id="newBtn" type="button" class="btn btn-primary">Nuevo</button>
        <button id="refreshBtn" type="button" class="btn">Actualizar</button>
      </div>
    </div>

    <section class="kpi-grid">
      <article class="card kpi-card"><p class="kpi-label">Total</p><p class="kpi-value" id="kpiTotal">0</p></article>
      <article class="card kpi-card"><p class="kpi-label">Activos</p><p class="kpi-value" id="kpiActive">0</p></article>
      <article class="card kpi-card"><p class="kpi-label">Stock total</p><p class="kpi-value" id="kpiStock">0</p></article>
      <article class="card kpi-card"><p class="kpi-label">Precio promedio</p><p class="kpi-value" id="kpiPrice">$0</p></article>
    </section>

    <section class="card panel">
      <div class="filters">
        <input id="searchInput" class="input" type="text" placeholder="Buscar diseño o categoría" />
        <select id="statusFilter" class="select">
          <option value="">Todos los estados</option>
          <option value="active">Activo</option>
          <option value="inactive">Inactivo</option>
        </select>
        <div id="resultCount" style="display:flex;align-items:center;color:#6b7280;font-size:0.84rem;">0 resultados</div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Categoría</th>
              <th>Base</th>
              <th>Personalización</th>
              <th>Stock</th>
              <th>Estado</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="designsBody"></tbody>
        </table>
        <div id="emptyState" class="empty" style="display:none;">No hay diseños para los filtros actuales.</div>
      </div>
    </section>
  </main>

  <div id="formOverlay" aria-hidden="true">
    <div class="form-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:10px;">
        <h3 id="formTitle" style="margin:0;font-size:1.05rem;font-weight:800;color:#1f2f4a;">Nuevo diseño</h3>
        <button id="closeFormBtn" type="button" class="btn">Cerrar</button>
      </div>

      <div class="form-grid">
        <div>
          <label class="label" for="fName">Nombre *</label>
          <input id="fName" class="input" type="text" placeholder="Nombre del diseño" />
        </div>
        <div>
          <label class="label" for="fCategoryId">ID categoría (opcional)</label>
          <input id="fCategoryId" class="input" type="text" placeholder="UUID de categoría" />
        </div>
        <div>
          <label class="label" for="fBasePrice">Precio base *</label>
          <input id="fBasePrice" class="input" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div>
          <label class="label" for="fPersonalizationPrice">Precio personalización</label>
          <input id="fPersonalizationPrice" class="input" type="number" min="0" step="0.01" placeholder="0.00" />
        </div>
        <div>
          <label class="label" for="fStock">Stock</label>
          <input id="fStock" class="input" type="number" min="0" step="1" placeholder="0" />
        </div>
        <div>
          <label class="label" for="fActive">Estado</label>
          <select id="fActive" class="select">
            <option value="true">Activo</option>
            <option value="false">Inactivo</option>
          </select>
        </div>
        <div class="col-2">
          <label class="label" for="fDescription">Descripción</label>
          <textarea id="fDescription" class="textarea" placeholder="Descripción breve"></textarea>
        </div>
      </div>

      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button id="cancelFormBtn" type="button" class="btn">Cancelar</button>
        <button id="saveBtn" type="button" class="btn btn-primary">Guardar</button>
      </div>
    </div>
  </div>

  <div id="toast" role="alert" aria-live="polite"></div>

  <script>
    const API_BASE = 'http://localhost:4000/api';
    let designs = [];
    let editingId = null;
    let toastTimer;

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.className = type;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => {
        toast.classList.remove('show');
      }, 3200);
    }

    function ensureAdmin() {
      if (!AUTH.isAuthenticated() || AUTH.getUser()?.role !== 'admin') {
        window.location.href = './login.html';
        return false;
      }
      return true;
    }

    function money(v) {
      return '$' + Number(v || 0).toLocaleString('es-MX', { minimumFractionDigits: 2 });
    }

    function fetchJson(endpoint, options = {}) {
      return fetch(API_BASE + endpoint, {
        ...options,
        headers: {
          ...AUTH.getHeaders(),
          ...(options.headers || {}),
        },
      }).then(async (response) => {
        const body = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(body.message || 'Error de comunicación con el servidor');
        }
        return body;
      });
    }

    async function loadDesigns() {
      const result = await fetchJson('/designs');
      designs = result.data || [];
      renderKpis();
      renderTable();
    }

    function renderKpis() {
      const active = designs.filter((d) => Boolean(d.active)).length;
      const stock = designs.reduce((sum, d) => sum + Number(d.stock || 0), 0);
      const avg = designs.length
        ? designs.reduce((sum, d) => sum + Number(d.base_price || 0), 0) / designs.length
        : 0;

      document.getElementById('kpiTotal').textContent = String(designs.length);
      document.getElementById('kpiActive').textContent = String(active);
      document.getElementById('kpiStock').textContent = String(stock);
      document.getElementById('kpiPrice').textContent = money(avg);
    }

    function getFilteredDesigns() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      const status = document.getElementById('statusFilter').value;

      return designs.filter((d) => {
        const name = String(d.name || '').toLowerCase();
        const category = String(d.category_name || '').toLowerCase();
        const matchesQuery = !query || name.includes(query) || category.includes(query);
        const matchesStatus = !status || (status === 'active' ? d.active : !d.active);
        return matchesQuery && matchesStatus;
      });
    }

    function renderTable() {
      const filtered = getFilteredDesigns();
      document.getElementById('resultCount').textContent = filtered.length + ' resultados';

      const body = document.getElementById('designsBody');
      const empty = document.getElementById('emptyState');

      if (!filtered.length) {
        body.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      body.innerHTML = filtered.map((d) => `
        <tr>
          <td><strong>${d.name || '-'}</strong></td>
          <td>${d.category_name || '-'}</td>
          <td>${money(d.base_price)}</td>
          <td>${money(d.personalization_price)}</td>
          <td>${Number(d.stock || 0)}</td>
          <td><span class="badge ${d.active ? 'b-active' : 'b-inactive'}">${d.active ? 'Activo' : 'Inactivo'}</span></td>
          <td>
            <button class="btn" type="button" onclick="openEdit('${d.id}')">Editar</button>
            <button class="btn btn-danger" type="button" onclick="deactivateDesign('${d.id}')">Desactivar</button>
          </td>
        </tr>
      `).join('');
    }

    function openForm() {
      document.getElementById('formOverlay').classList.add('open');
    }

    function closeForm() {
      document.getElementById('formOverlay').classList.remove('open');
      editingId = null;
      document.getElementById('formTitle').textContent = 'Nuevo diseño';
      document.getElementById('fName').value = '';
      document.getElementById('fCategoryId').value = '';
      document.getElementById('fBasePrice').value = '';
      document.getElementById('fPersonalizationPrice').value = '';
      document.getElementById('fStock').value = '';
      document.getElementById('fDescription').value = '';
      document.getElementById('fActive').value = 'true';
    }

    function openEdit(id) {
      const d = designs.find((item) => item.id === id);
      if (!d) return;

      editingId = id;
      document.getElementById('formTitle').textContent = 'Editar diseño';
      document.getElementById('fName').value = d.name || '';
      document.getElementById('fCategoryId').value = d.category_id || '';
      document.getElementById('fBasePrice').value = Number(d.base_price || 0);
      document.getElementById('fPersonalizationPrice').value = Number(d.personalization_price || 0);
      document.getElementById('fStock').value = Number(d.stock || 0);
      document.getElementById('fDescription').value = d.description || '';
      document.getElementById('fActive').value = String(Boolean(d.active));
      openForm();
    }

    async function saveDesign() {
      const wasEditing = Boolean(editingId);
      const name = document.getElementById('fName').value.trim();
      const categoryId = document.getElementById('fCategoryId').value.trim();
      const basePrice = Number(document.getElementById('fBasePrice').value || 0);
      const personalizationPrice = Number(document.getElementById('fPersonalizationPrice').value || 0);
      const stock = Number(document.getElementById('fStock').value || 0);
      const description = document.getElementById('fDescription').value.trim();
      const active = document.getElementById('fActive').value === 'true';

      if (!name) {
        showToast('El nombre es obligatorio.', 'error');
        return;
      }

      if (Number.isNaN(basePrice) || basePrice < 0) {
        showToast('Precio base inválido.', 'error');
        return;
      }

      const payload = {
        name,
        base_price: basePrice,
        personalization_price: Number.isNaN(personalizationPrice) ? 0 : personalizationPrice,
        stock: Number.isNaN(stock) ? 0 : stock,
        description: description || null,
        active,
      };

      if (categoryId) {
        payload.category_id = categoryId;
      }

      if (editingId) {
        await fetchJson(`/designs/${editingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
      } else {
        await fetchJson('/designs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
      }

      closeForm();
      await loadDesigns();
      showToast(wasEditing ? 'Diseño actualizado correctamente.' : 'Diseño creado correctamente.');
    }

    async function deactivateDesign(id) {
      if (!confirm('¿Desactivar este diseño?')) return;
      try {
        await fetchJson(`/designs/${id}`, { method: 'DELETE' });
        await loadDesigns();
        showToast('Diseño desactivado correctamente.');
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    window.openEdit = openEdit;
    window.deactivateDesign = deactivateDesign;

    document.addEventListener('DOMContentLoaded', async () => {
      if (!ensureAdmin()) return;

      document.getElementById('newBtn').addEventListener('click', openForm);
      document.getElementById('refreshBtn').addEventListener('click', async () => {
        try {
          await loadDesigns();
          showToast('Lista de diseños actualizada.');
        } catch (error) {
          showToast(error.message, 'error');
        }
      });
      document.getElementById('searchInput').addEventListener('input', renderTable);
      document.getElementById('statusFilter').addEventListener('change', renderTable);
      document.getElementById('closeFormBtn').addEventListener('click', closeForm);
      document.getElementById('cancelFormBtn').addEventListener('click', closeForm);
      document.getElementById('saveBtn').addEventListener('click', async () => {
        try { await saveDesign(); } catch (error) { showToast(error.message, 'error'); }
      });
      document.getElementById('formOverlay').addEventListener('click', (e) => {
        if (e.target.id === 'formOverlay') closeForm();
      });

      try {
        await loadDesigns();
      } catch (error) {
        showToast(error.message, 'error');
      }
    });
  </script>
</body>
</html>
