<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diseños Acuña — Acceso</title>
  <link href="../src/css/output.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #b8924a;
      --gold-light: #d4ac6a;
      --gold-dim: rgba(184,146,74,0.15);
      --gold-glow: rgba(184,146,74,0.25);
      --dark: #0d0d0d;
      --dark-2: #141414;
      --dark-3: #1c1c1c;
      --dark-4: #252525;
      --border: rgba(255,255,255,0.08);
      --border-gold: rgba(184,146,74,0.35);
      --text: #f0ece4;
      --text-muted: #8a8070;
      --red: #e05252;
      --red-bg: rgba(224,82,82,0.1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
      overflow-y: auto;
    }

    /* Geometric background pattern */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(184,146,74,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(184,146,74,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Diagonal accent */
    body::after {
      content: '';
      position: fixed;
      top: -200px;
      right: -200px;
      width: 600px;
      height: 600px;
      border: 1px solid rgba(184,146,74,0.06);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      animation: fadeIn 0.6s ease both;
    }

    /* Brand header */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      border: 1px solid var(--border-gold);
      border-radius: 14px;
      margin: 0 auto 16px;
      background: var(--gold-dim);
      position: relative;
    }

    .brand-logo svg {
      width: 26px;
      height: 26px;
      color: var(--gold);
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .brand-name span {
      color: var(--gold);
    }

    .brand-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 5px;
    }

    /* Card */
    .card {
      background: var(--dark-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
      opacity: 0.35;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }

    /* Form fields */
    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      margin-bottom: 7px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      color: var(--text-muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .input-field {
      width: 100%;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 42px 11px 38px;
      font-size: 0.875rem;
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
      appearance: none;
      -webkit-appearance: none;
    }

    .input-field::placeholder { color: #3a3530; }
    .input-field:hover { border-color: rgba(255,255,255,0.14); }
    .input-field:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px var(--gold-glow);
    }
    .input-field.error {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(224,82,82,0.12);
    }

    /* select specific */
    select.input-field {
      cursor: pointer;
      padding-right: 38px;
    }

    select.input-field option {
      background: var(--dark-3);
      color: var(--text);
    }

    .toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 2px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .toggle-btn:hover { color: var(--text); }
    .toggle-btn svg { width: 15px; height: 15px; }

    .select-arrow {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-muted);
    }
    .select-arrow svg { width: 14px; height: 14px; }

    /* Error texts */
    .field-error {
      font-size: 0.72rem;
      color: var(--red);
      margin-top: 5px;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .field-error.visible { display: flex; }

    /* Global error banner */
    .error-banner {
      background: var(--red-bg);
      border: 1px solid rgba(224,82,82,0.2);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.8rem;
      color: #f08080;
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .error-banner.visible { display: flex; }
    .error-banner svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      background: var(--gold);
      color: #0d0d0d;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 0.875rem;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 8px;
    }
    .btn-submit:hover {
      background: var(--gold-light);
      box-shadow: 0 4px 20px rgba(184,146,74,0.35);
    }
    .btn-submit:active { transform: scale(0.98); }
    .btn-submit:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(13,13,13,0.3);
      border-top-color: #0d0d0d;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner.visible { display: block; }
    .hidden { display: none !important; }

    /* Footer */
    .card-footer {
      margin-top: 22px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--text-muted);
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Focus visible for accessibility */
    .input-wrap:focus-within .input-icon {
      color: var(--gold);
    }

    @media (max-width: 480px) {
      .card { padding: 28px 20px; }
      body { padding: 14px; }
    }
  </style>
</head>
<body>

  <div class="page-wrap">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">
        <!-- Needle + thread icon -->
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 00-2.456 2.456z" />
        </svg>
      </div>
      <div class="brand-name">Diseños <span>Acuña</span></div>
      <div class="brand-sub">Panel de Administración</div>
    </div>

    <!-- Login card -->
    <div class="card">
      <div class="card-title">Iniciar sesión</div>
      <div class="card-subtitle">Ingresa tus credenciales para continuar</div>

      <!-- Error banner -->
      <div id="errorBanner" class="error-banner" role="alert">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="errorMsg">Credenciales incorrectas. Inténtalo de nuevo.</span>
      </div>

      <form id="loginForm" novalidate>

        <!-- Correo -->
        <div class="field">
          <label for="email">Correo electrónico</label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
            </svg>
            <input
              id="email"
              type="email"
              class="input-field"
              placeholder="correo@ejemplo.com"
              autocomplete="email"
            />
          </div>
          <div id="emailError" class="field-error">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span></span>
          </div>
        </div>

        <!-- Contraseña -->
        <div class="field">
          <label for="password">Contraseña</label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
            </svg>
            <input
              id="password"
              type="password"
              class="input-field"
              placeholder="••••••••"
              autocomplete="current-password"
            />
            <button type="button" class="toggle-btn" id="togglePass" aria-label="Mostrar contraseña">
              <svg class="eye-off" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />
              </svg>
              <svg class="eye-on hidden" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </button>
          </div>
          <div id="passwordError" class="field-error">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span></span>
          </div>
        </div>

        <!-- Rol -->
        <div class="field">
          <label for="role">Tipo de usuario</label>
          <div class="input-wrap">
            <svg class="input-icon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z" />
            </svg>
            <select id="role" class="input-field" style="padding-left: 38px;">
              <option value="">Selecciona un rol</option>
              <option value="admin">Administrador</option>
              <option value="employee">Empleado</option>
            </select>
            <div class="select-arrow">
              <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
          <div id="roleError" class="field-error">
            <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span></span>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" id="submitBtn" class="btn-submit">
          <span id="submitText">Ingresar al panel</span>
          <div id="submitSpinner" class="spinner"></div>
        </button>

      </form>

      <div class="card-footer">
        Diseños Acuña &copy; <span id="year"></span> &mdash; Acceso restringido
      </div>
    </div>

  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ── Mock users ──
    const USERS = [
      { id: 1, email: 'admin@disenosacuna.com',    password: 'Admin123!',  role: 'admin',    name: 'Administrador' },
      { id: 2, email: 'empleado@disenosacuna.com', password: 'Empleado1@', role: 'employee', name: 'Empleado'       },
    ];

    // ── Toggle password visibility ──
    document.getElementById('togglePass').addEventListener('click', function () {
      const inp = document.getElementById('password');
      const isText = inp.type === 'text';
      inp.type = isText ? 'password' : 'text';
      this.querySelector('.eye-off').classList.toggle('hidden', !isText);
      this.querySelector('.eye-on').classList.toggle('hidden', isText);
    });

    // ── Field validation helpers ──
    function setError(fieldId, errorId, msg) {
      const field = document.getElementById(fieldId);
      const errEl = document.getElementById(errorId);
      if (msg) {
        field.classList.add('error');
        errEl.querySelector('span').textContent = msg;
        errEl.classList.add('visible');
        return false;
      } else {
        field.classList.remove('error');
        errEl.classList.remove('visible');
        return true;
      }
    }

    function validateFields(email, password, role) {
      let ok = true;

      // Email
      if (!email) {
        ok = setError('email', 'emailError', 'El correo es requerido') && ok;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        ok = setError('email', 'emailError', 'Ingresa un correo válido') && ok;
      } else {
        setError('email', 'emailError', '');
      }

      // Password
      if (!password) {
        ok = setError('password', 'passwordError', 'La contraseña es requerida') && ok;
      } else if (password.length < 6) {
        ok = setError('password', 'passwordError', 'Mínimo 6 caracteres') && ok;
      } else {
        setError('password', 'passwordError', '');
      }

      // Role
      if (!role) {
        ok = setError('role', 'roleError', 'Selecciona tu tipo de usuario') && ok;
      } else {
        setError('role', 'roleError', '');
      }

      return ok;
    }

    // ── Clear errors on input ──
    ['email', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        setError(id, id + 'Error', '');
        document.getElementById('errorBanner').classList.remove('visible');
      });
    });
    document.getElementById('role').addEventListener('change', () => {
      setError('role', 'roleError', '');
    });

    // ── Form submit ──
    document.getElementById('loginForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const role     = document.getElementById('role').value;

      // Hide global error
      document.getElementById('errorBanner').classList.remove('visible');

      if (!validateFields(email, password, role)) return;

      // Simulate loading
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('submitText').textContent = 'Verificando…';
      document.getElementById('submitSpinner').classList.add('visible');

      await new Promise(r => setTimeout(r, 1200));

      // Find user
      const user = USERS.find(u =>
        u.email === email &&
        u.password === password &&
        u.role === role
      );

      btn.disabled = false;
      document.getElementById('submitText').textContent = 'Ingresar al panel';
      document.getElementById('submitSpinner').classList.remove('visible');

      if (user) {
        // Save session info
        sessionStorage.setItem('da_user', JSON.stringify({ id: user.id, name: user.name, role: user.role, email: user.email }));
        // Redirect to panel
        window.location.href = '../panelAdmin/index.html';
      } else {
        // Show global error
        const banner = document.getElementById('errorBanner');
        const msg    = document.getElementById('errorMsg');

        // More specific error messaging
        const userExists = USERS.find(u => u.email === email);
        if (!userExists) {
          msg.textContent = 'No existe una cuenta con ese correo.';
        } else {
          const roleMatch = USERS.find(u => u.email === email && u.role === role);
          if (!roleMatch) {
            msg.textContent = 'El tipo de usuario no coincide con esta cuenta.';
          } else {
            msg.textContent = 'Contraseña incorrecta. Inténtalo de nuevo.';
          }
        }
        banner.classList.add('visible');

        // Shake the card
        const card = document.querySelector('.card');
        card.style.animation = 'none';
        card.offsetHeight;
        card.style.animation = 'shake 0.4s ease';
      }
    });
  </script>

  <style>
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
  </style>

</body>
</html>
