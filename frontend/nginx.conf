server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index landing/index.html;

  location / {
    try_files $uri $uri/ /landing/index.html;
  }

  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|webp)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }

  location ~* \.html$ {
    add_header Cache-Control "no-store";
    try_files $uri =404;
  }
}
