<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diseños Acuña — Crear Cuenta</title>
  <link href="../src/css/output.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold:       #B8962E;
      --gold-light: #C9A84C;
      --dark:       #1a1a2e;
      --text-muted: #6b7280;
      --bg:         #f5f4f0;
      --white:      #ffffff;
      --border:     #e4e1d8;
      --danger:     #dc2626;
      --success:    #10b981;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .page-wrap {
      width: 100%;
      max-width: 420px;
      animation: slideUp 0.6s ease both;
    }

    /* Brand header */
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border: 2px solid var(--gold);
      border-radius: 10px;
      background: rgba(184,150,46,0.08);
      margin: 0 auto 16px;
    }

    .brand-logo svg {
      width: 24px;
      height: 24px;
      color: var(--gold);
    }

    .brand-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
    }

    .brand-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* Card */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }

    .card-subtitle {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 24px;
    }

    /* Form grid */
    .form-grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 500px) {
      .form-grid-2 { grid-template-columns: 1fr; }
    }

    /* Fields */
    .field {
      margin-bottom: 14px;
    }

    .field-inline {
      margin-top: -6px;
      margin-bottom: 8px;
    }

    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
    }

    .checkbox-label input {
      width: 14px;
      height: 14px;
      accent-color: var(--gold);
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 5px;
    }

    .input-field {
      width: 100%;
      height: 42px;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      color: var(--dark);
      transition: border-color 0.2s;
      appearance: none;
    }

    .input-field::placeholder { color: #bbb; }
    .input-field:hover { border-color: #ccc; }
    .input-field:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(184,150,46,0.1);
    }
    .input-field.error {
      border-color: var(--danger);
      box-shadow: 0 0 0 3px rgba(220,38,38,0.08);
    }

    /* Error text */
    .field-error {
      font-size: 0.75rem;
      color: var(--danger);
      margin-top: 4px;
      display: none;
    }
    .field-error.visible { display: block; }

    /* Global message */
    .alert {
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .alert.visible { display: flex; }
    .alert.error {
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.2);
      color: var(--danger);
    }
    .alert.success {
      background: rgba(16,185,129,0.08);
      border: 1px solid rgba(16,185,129,0.2);
      color: var(--success);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      height: 42px;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: var(--gold);
      color: white;
    }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--border);
      color: var(--dark);
    }
    .btn-secondary:hover { background: #d4cfc0; }

    .spinner {
      display: none;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner.visible { display: block; }

    /* Footer */
    .card-footer {
      margin-top: 18px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .card-footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }
    .card-footer a:hover { text-decoration: underline; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .card { padding: 24px 20px; }
      body { padding: 20px; }
    }
  </style>
</head>
<body>

  <div class="page-wrap">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">
        <svg fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
        </svg>
      </div>
      <div class="brand-name">Diseños Acuña</div>
      <div class="brand-sub">Crea tu cuenta</div>
    </div>

    <!-- Register card -->
    <div class="card">
      <div class="card-title">Crear Cuenta</div>
      <div class="card-subtitle">Únete a nuestra comunidad de diseñadores</div>

      <!-- Alert messages -->
      <div id="successAlert" class="alert success" role="alert">
        <svg fill="currentColor" viewBox="0 0 20 20" style="width:16px;height:16px;">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>
        </svg>
        <span id="successMsg">¡Cuenta creada! Redirigiendo...</span>
      </div>

      <div id="errorAlert" class="alert error" role="alert">
        <svg fill="currentColor" viewBox="0 0 20 20" style="width:16px;height:16px;">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"/>
        </svg>
        <span id="errorMsg">Error al crear la cuenta</span>
      </div>

      <form id="registerForm" novalidate>

        <!-- Nombre completo -->
        <div class="field">
          <label for="fullName">Nombre Completo</label>
          <input id="fullName" type="text" class="input-field" placeholder="Juan Pérez">
          <div id="fullNameError" class="field-error"></div>
        </div>

        <!-- Email -->
        <div class="field">
          <label for="email">Correo Electrónico</label>
          <input id="email" type="email" class="input-field" placeholder="tu@email.com" autocomplete="email">
          <div id="emailError" class="field-error"></div>
        </div>

        <!-- Teléfono -->
        <div class="field">
          <label for="phone">Teléfono (Opcional)</label>
          <input id="phone" type="tel" class="input-field" placeholder="+52 55 1234 5678">
          <div id="phoneError" class="field-error"></div>
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Contraseña</label>
          <input id="password" type="password" class="input-field" placeholder="••••••••" autocomplete="new-password">
          <div id="passwordError" class="field-error"></div>
        </div>

        <!-- Confirm Password -->
        <div class="field">
          <label for="confirmPassword">Confirmar Contraseña</label>
          <input id="confirmPassword" type="password" class="input-field" placeholder="••••••••" autocomplete="new-password">
          <div id="confirmPasswordError" class="field-error"></div>
        </div>

        <div class="field field-inline">
          <label class="checkbox-label" for="showPasswords">
            <input id="showPasswords" type="checkbox">
            Mostrar contraseñas
          </label>
        </div>

        <div class="field field-inline">
          <label class="checkbox-label" for="acceptTerms">
            <input id="acceptTerms" type="checkbox">
            Acepto términos y condiciones
          </label>
          <div id="acceptTermsError" class="field-error"></div>
        </div>

        <div class="field field-inline">
          <label class="checkbox-label" for="acceptPrivacy">
            <input id="acceptPrivacy" type="checkbox">
            Acepto aviso de privacidad
          </label>
          <div id="acceptPrivacyError" class="field-error"></div>
        </div>

        <!-- Buttons -->
        <div class="btn-group">
          <button type="button" class="btn btn-secondary" onclick="window.location.href='./login.html'">
            Volver
          </button>
          <button type="submit" id="submitBtn" class="btn btn-primary">
            <span id="submitText">Crear Cuenta</span>
            <div id="submitSpinner" class="spinner"></div>
          </button>
        </div>

      </form>

      <!-- Footer -->
      <div class="card-footer">
        ¿Ya tienes cuenta? <a href="./login.html">Inicia sesión aquí</a>
      </div>
    </div>

  </div>

  <script src="../src/js/auth.js"></script>
  <script>
    // Si ya está autenticado, redirigir
    if (AUTH.isAuthenticated()) {
      const user = AUTH.getUser();
      if (user?.role === 'admin' || user?.role === 'gerente' || user?.role === 'colaborador') {
        window.location.href = '../panelAdmin/index.html';
      } else {
        window.location.href = './index.html';
      }
    }

    /**
     * Validar campos del formulario
     */
    function validateForm() {
      let isValid = true;

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const acceptTerms = document.getElementById('acceptTerms').checked;
      const acceptPrivacy = document.getElementById('acceptPrivacy').checked;

      // Limpiar errores previos
      document.querySelectorAll('.field-error').forEach(el => {
        el.textContent = '';
        el.classList.remove('visible');
      });
      document.querySelectorAll('.input-field').forEach(el => el.classList.remove('error'));

      // Validación: Nombre
      if (!fullName) {
        setFieldError('fullName', 'El nombre es requerido');
        isValid = false;
      } else if (fullName.length < 3) {
        setFieldError('fullName', 'Mínimo 3 caracteres');
        isValid = false;
      }

      // Validación: Email
      if (!email) {
        setFieldError('email', 'El email es requerido');
        isValid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError('email', 'Email no válido');
        isValid = false;
      }

      // Validación: Contraseña
      if (!password) {
        setFieldError('password', 'La contraseña es requerida');
        isValid = false;
      } else if (password.length < 8) {
        setFieldError('password', 'Mínimo 8 caracteres');
        isValid = false;
      } else if (!/(?=.*[a-z])(?=.*[A-Z])(?=.*\d)/.test(password)) {
        setFieldError('password', 'Debe tener mayúscula, minúscula y número');
        isValid = false;
      }

      // Validación: Confirmar contraseña
      if (password !== confirmPassword) {
        setFieldError('confirmPassword', 'Las contraseñas no coinciden');
        isValid = false;
      }

      if (!acceptTerms) {
        setFieldError('acceptTerms', 'Debes aceptar los términos');
        isValid = false;
      }

      if (!acceptPrivacy) {
        setFieldError('acceptPrivacy', 'Debes aceptar el aviso de privacidad');
        isValid = false;
      }

      return isValid;
    }

    function setFieldError(fieldId, message) {
      document.getElementById(fieldId).classList.add('error');
      const errorEl = document.getElementById(fieldId + 'Error');
      errorEl.textContent = message;
      errorEl.classList.add('visible');
    }

    function clearFieldError(fieldId) {
      document.getElementById(fieldId).classList.remove('error');
      const errorEl = document.getElementById(fieldId + 'Error');
      if (errorEl) {
        errorEl.textContent = '';
        errorEl.classList.remove('visible');
      }
    }

    function showAlert(type, message) {
      const alert = document.getElementById(type + 'Alert');
      const msg = document.getElementById(type + 'Msg');
      const other = type === 'error' ? 'successAlert' : 'errorAlert';

      document.getElementById(other).classList.remove('visible');
      alert.classList.add('visible');
      msg.textContent = message;
    }

    function hideAlerts() {
      document.getElementById('errorAlert').classList.remove('visible');
      document.getElementById('successAlert').classList.remove('visible');
    }

    /**
     * Manejar envío del formulario
     */
    document.getElementById('registerForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      hideAlerts();

      if (!validateForm()) return;

      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim() || null;
      const password = document.getElementById('password').value;

      // Mostrar loading
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      document.getElementById('submitText').textContent = 'Creando cuenta…';
      document.getElementById('submitSpinner').classList.add('visible');

      try {
        // Llamar a AUTH.register()
        await AUTH.register(email, password, fullName, phone);

        // Éxito
        showAlert('success', '¡Cuenta creada con éxito! Redirigiendo...');
        
        // Redirigir al landing en 2 segundos
        setTimeout(() => {
          window.location.href = './index.html';
        }, 2000);

      } catch (error) {
        // Error
        btn.disabled = false;
        document.getElementById('submitText').textContent = 'Crear Cuenta';
        document.getElementById('submitSpinner').classList.remove('visible');

        showAlert('error', error.message || 'Error al crear la cuenta. Intenta de nuevo.');
      }
    });

    document.getElementById('showPasswords').addEventListener('change', function (e) {
      const nextType = e.target.checked ? 'text' : 'password';
      document.getElementById('password').type = nextType;
      document.getElementById('confirmPassword').type = nextType;
    });

    ['fullName', 'email', 'phone', 'password', 'confirmPassword', 'acceptTerms', 'acceptPrivacy'].forEach((fieldId) => {
      document.getElementById(fieldId).addEventListener('input', () => {
        clearFieldError(fieldId);
        hideAlerts();
      });
    });
  </script>

</body>
</html>
