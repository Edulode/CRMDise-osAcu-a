<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diseños Acuña — Nueva contraseña</title>
  <link href="../src/css/output.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #f5f4f0; min-height: 100vh; display: grid; place-items: center; margin: 0; padding: 24px; }
    .card { width: min(420px, 100%); background: #fff; border: 1px solid #e4e1d8; border-radius: 16px; padding: 28px; }
    h1 { font-family: 'Playfair Display', serif; margin: 0 0 8px; }
    .field { margin-top: 14px; }
    label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 600; }
    input { width: 100%; border: 1px solid #e4e1d8; border-radius: 8px; padding: 12px; font: inherit; }
    button { width: 100%; margin-top: 18px; padding: 12px; border: 0; border-radius: 8px; background: #c9a84c; color: #fff; font-weight: 700; cursor: pointer; }
    .message { margin-top: 16px; font-size: 0.92rem; }
    a { color: #b8962e; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Nueva contraseña</h1>
    <p>Ingresa el token recibido por correo y define una nueva contraseña.</p>
    <form id="resetForm">
      <div class="field">
        <label for="token">Token</label>
        <input id="token" type="text" required />
      </div>
      <div class="field">
        <label for="newPassword">Nueva contraseña</label>
        <input id="newPassword" type="password" required />
      </div>
      <div class="field">
        <label for="confirmPassword">Confirmar contraseña</label>
        <input id="confirmPassword" type="password" required />
      </div>
      <button type="submit">Actualizar contraseña</button>
    </form>
    <div id="message" class="message"></div>
    <p style="margin-top: 14px;"><a href="./login.html">Volver al inicio de sesión</a></p>
  </div>

  <script>
    const API_BASE = '/api';
    const params = new URLSearchParams(window.location.search);
    document.getElementById('token').value = params.get('token') || '';

    document.getElementById('resetForm').addEventListener('submit', async (event) => {
      event.preventDefault();
      const token = document.getElementById('token').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const message = document.getElementById('message');

      if (newPassword !== confirmPassword) {
        message.textContent = 'Las contraseñas no coinciden';
        return;
      }

      const response = await fetch(`${API_BASE}/auth/password-reset/confirm`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword }),
      });

      const body = await response.json().catch(() => ({}));
      if (!response.ok) {
        message.textContent = body.message || 'No se pudo actualizar la contraseña';
        return;
      }

      message.textContent = body.message || 'Contraseña actualizada correctamente';
    });
  </script>
</body>
</html>
