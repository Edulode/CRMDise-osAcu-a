<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo</title>
    <script src="../src/css/navbar.js" defer></script>
    <link href="../src/css/output.css" rel="stylesheet">
    <script src="../src/css/footer.js" defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lora:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #B8962E;
            --gold-light: #C9A84C;
            --dark: #1a1a2e;
            --text-muted: #666;
            --bg: #f5f4f0;
            --white: #ffffff;
            --border: #e4e1d8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg);
            color: var(--dark);
        }

        /* ── HEADER ── */
        .catalog-header {
            padding: 3rem 4rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .catalog-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 0.4rem;
        }

        .catalog-header p {
            font-size: 1rem;
            color: var(--text-muted);
        }

        /* ── LAYOUT ── */
        .catalog-layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 2rem;
            padding: 2rem 4rem;
            align-items: start;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            position: sticky;
            top: 1.5rem;
            background: var(--white);
            border-radius: 10px;
            padding: 1.8rem;
            border: 1px solid var(--border);
        }

        .filter-group {
            margin-bottom: 1.8rem;
        }

        .filter-group:last-child {
            margin-bottom: 0;
        }

        .filter-title {
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--dark);
            margin-bottom: 0.9rem;
        }

        .filter-check {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 0.55rem;
            cursor: pointer;
            font-size: 0.92rem;
            color: var(--dark);
        }

        .filter-check input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--gold);
            cursor: pointer;
        }

        /* Price range */
        .price-range {
            width: 100%;
            accent-color: var(--dark);
            cursor: pointer;
        }

        .price-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 0.4rem;
        }

        /* Color dots */
        .color-dots {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .color-dot {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s, transform 0.2s;
        }

        .color-dot:hover,
        .color-dot.active {
            border-color: var(--dark);
            transform: scale(1.1);
        }

        /* ── MAIN CONTENT ── */

        .catalog-topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* ── PRODUCT GRID ── */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.4rem;
        }

        /* ── PRODUCT CARD ── */
        .product-card {
            background: var(--white);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: box-shadow 0.25s, transform 0.25s;
        }

        .product-card:hover {
            box-shadow: 0 12px 40px rgba(0,0,0,0.10);
            transform: translateY(-3px);
        }

        .product-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .product-body {
            padding: 1rem 1.1rem 1.2rem;
        }

        .product-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.45rem;
        }

        .product-tag {
            background-color: rgba(184,150,46,0.12);
            color: var(--gold);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
        }

        .product-rating {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .star-icon {
            color: var(--gold);
            font-size: 0.85rem;
        }

        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 0.4rem;
        }

        .product-price {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.9rem;
        }

        .product-price span {
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: 2px;
        }

        .btn-detail {
            display: block;
            width: 100%;
            background-color: var(--gold);
            color: #fff;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            padding: 0.7rem;
            border-radius: 5px;
            text-align: center;
            text-decoration: none;
            transition: background 0.22s, transform 0.18s;
        }

        .btn-detail:hover {
            background-color: var(--gold-light);
            transform: translateY(-1px);
        }

        /* ── PAGINATION ── */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.4rem;
            margin-top: 2.5rem;
            padding-bottom: 2rem;
        }

        .page-btn {
            min-width: 38px;
            height: 38px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--white);
            color: var(--dark);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
            text-decoration: none;
            padding: 0 0.6rem;
        }

        .page-btn:hover {
            border-color: var(--dark);
        }

        .page-btn.active {
            background-color: var(--dark);
            color: #fff;
            border-color: var(--dark);
        }

        /* ── MOBILE FILTER BUTTON ── */
        .mobile-filter-btn {
            display: none;
            align-items: center;
            gap: 0.4rem;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.5rem 1rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            color: var(--dark);
        }

        /* ── FILTER DRAWER (mobile) ── */
        .filter-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
        }

        .filter-drawer {
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            width: 280px;
            background: var(--white);
            z-index: 101;
            padding: 1.5rem;
            overflow-y: auto;
            transform: translateX(-100%);
            transition: transform 0.3s ease;
        }

        .filter-drawer.open {
            transform: translateX(0);
        }

        .filter-overlay.open {
            display: block;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .drawer-header h3 {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .drawer-close {
            background: none;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--dark);
            line-height: 1;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .catalog-header {
                padding: 2rem 1.4rem 1.5rem;
            }

            .catalog-layout {
                grid-template-columns: 1fr;
                padding: 1.2rem 1.4rem;
            }

            .sidebar {
                display: none; /* hidden on mobile, shown in drawer */
            }

            .mobile-filter-btn {
                display: flex;
            }

            .products-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }

            .catalog-topbar {
                flex-direction: row;
                gap: 0.5rem;
            }
        }

        @media (min-width: 769px) and (max-width: 1024px) {
            .catalog-layout {
                grid-template-columns: 220px 1fr;
                padding: 2rem 2rem;
            }

            .products-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- ── HEADER ── -->
    <div class="catalog-header">
        <h1>Catálogo de Invitaciones</h1>
        <p>Explora nuestra colección completa de diseños personalizables</p>
    </div>

    <!-- ── LAYOUT ── -->
    <div class="catalog-layout">

        <!-- SIDEBAR (desktop) -->
        <aside class="sidebar" id="sidebar-desktop">
            <div class="filter-group">
                <p class="filter-title">Categoría</p>
                <label class="filter-check"><input type="checkbox" data-filter="cat" value="Bodas"> Bodas</label>
                <label class="filter-check"><input type="checkbox" data-filter="cat" value="Bautizos"> Bautizos</label>
                <label class="filter-check"><input type="checkbox" data-filter="cat" value="Cumpleaños"> Cumpleaños</label>
                <label class="filter-check"><input type="checkbox" data-filter="cat" value="Eventos especiales"> Eventos especiales</label>
            </div>

            <div class="filter-group">
                <p class="filter-title">Precio</p>
                <input type="range" class="price-range" id="price-range-desktop" min="0" max="1000" value="1000">
                <div class="price-labels"><span>$0</span><span id="price-val-desktop">$1000</span></div>
            </div>

            <div class="filter-group">
                <p class="filter-title">Color</p>
                <div class="color-dots">
                    <div class="color-dot" style="background:#1a1a2e" title="Azul oscuro"></div>
                    <div class="color-dot" style="background:#B8962E" title="Dorado"></div>
                    <div class="color-dot" style="background:#f0ede8" title="Blanco"></div>
                    <div class="color-dot" style="background:#e8a898" title="Salmón"></div>
                    <div class="color-dot" style="background:#a8c8a0" title="Verde"></div>
                    <div class="color-dot" style="background:#e87898" title="Rosa"></div>
                </div>
            </div>

            <div class="filter-group">
                <p class="filter-title">Tipo</p>
                <label class="filter-check"><input type="checkbox" data-filter="tipo" value="Digital"> Digital</label>
                <label class="filter-check"><input type="checkbox" data-filter="tipo" value="Impreso"> Impreso</label>
                <label class="filter-check"><input type="checkbox" data-filter="tipo" value="Premium"> Premium</label>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="catalog-main">

            <div class="catalog-topbar">
                <span id="result-count">Mostrando 6 resultados</span>
                <button class="mobile-filter-btn" id="open-filters">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
                    Filtros
                </button>
            </div>

            <!-- GRID - se construye dinámicamente desde el arreglo -->
            <div class="products-grid" id="products-grid"></div>

            <!-- PAGINATION -->
            <div class="pagination">
                <a href="#" class="page-btn">Anterior</a>
                <a href="#" class="page-btn active">1</a>
                <a href="#" class="page-btn">2</a>
                <a href="#" class="page-btn">3</a>
                <a href="#" class="page-btn">4</a>
                <a href="#" class="page-btn">Siguiente</a>
            </div>

        </main>
    </div>

    <!-- ── FILTER OVERLAY (mobile) ── -->
    <div class="filter-overlay" id="filter-overlay"></div>

    <!-- ── FILTER DRAWER (mobile) ── -->
    <div class="filter-drawer" id="filter-drawer">
        <div class="drawer-header">
            <h3>Filtros</h3>
            <button class="drawer-close" id="close-filters">✕</button>
        </div>

        <div class="filter-group">
            <p class="filter-title">Categoría</p>
            <label class="filter-check"><input type="checkbox"> Bodas</label>
            <label class="filter-check"><input type="checkbox"> Bautizos</label>
            <label class="filter-check"><input type="checkbox"> Cumpleaños</label>
            <label class="filter-check"><input type="checkbox"> Eventos especiales</label>
        </div>

        <div class="filter-group">
            <p class="filter-title">Precio</p>
            <input type="range" class="price-range" id="price-range-mobile" min="0" max="1000" value="1000">
            <div class="price-labels"><span>$0</span><span id="price-val-mobile">$1000</span></div>
        </div>

        <div class="filter-group">
            <p class="filter-title">Color</p>
            <div class="color-dots">
                <div class="color-dot" style="background:#1a1a2e"></div>
                <div class="color-dot" style="background:#B8962E"></div>
                <div class="color-dot" style="background:#f0ede8"></div>
                <div class="color-dot" style="background:#e8a898"></div>
                <div class="color-dot" style="background:#a8c8a0"></div>
                <div class="color-dot" style="background:#e87898"></div>
            </div>
        </div>

        <div class="filter-group">
            <p class="filter-title">Tipo</p>
            <label class="filter-check"><input type="checkbox"> Digital</label>
            <label class="filter-check"><input type="checkbox"> Impreso</label>
            <label class="filter-check"><input type="checkbox"> Premium</label>
        </div>
    </div>

    <script>
        /* ════════════════════════════════════════
           ARREGLO DE PRODUCTOS
           → Reemplaza este arreglo con datos de tu BD
        ════════════════════════════════════════ */
        const productos = [
            {
                id: 1,
                nombre: "Elegancia Clásica",
                categoria: "Bodas",
                precio: 450,
                rating: 4.8,
                imagen: "https://images.unsplash.com/photo-1519741497674-611481863552?w=600&q=80"
            },
            {
                id: 2,
                nombre: "Moderno Minimalista",
                categoria: "Bodas",
                precio: 380,
                rating: 4.9,
                imagen: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80"
            },
            {
                id: 3,
                nombre: "Jardín Florido",
                categoria: "Bodas",
                precio: 420,
                rating: 4.7,
                imagen: "https://images.unsplash.com/photo-1530103862676-de8c9debad1d?w=600&q=80"
            },
            {
                id: 4,
                nombre: "Simpleza Dorada",
                categoria: "Bautizos",
                precio: 395,
                rating: 4.6,
                imagen: "https://images.unsplash.com/photo-1568702846914-96b305d2aaeb?w=600&q=80"
            },
            {
                id: 5,
                nombre: "Romance Eterno",
                categoria: "Bodas",
                precio: 480,
                rating: 5.0,
                imagen: "https://images.unsplash.com/photo-1519741497674-611481863552?w=600&q=80"
            },
            {
                id: 6,
                nombre: "Fiesta Vibrante",
                categoria: "Cumpleaños",
                precio: 350,
                rating: 4.5,
                imagen: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80"
            }
        ];

        /* ════════════════════════════════════════
           RENDER – UNA SOLA PLANTILLA DE TARJETA
        ════════════════════════════════════════ */
        function renderCard(producto) {
            return `
                <div class="product-card">
                    <img
                        class="product-img"
                        src="${producto.imagen}"
                        alt="${producto.nombre}"
                        loading="lazy"
                    />
                    <div class="product-body">
                        <div class="product-meta">
                            <span class="product-tag">${producto.categoria}</span>
                            <span class="product-rating">
                                <span class="star-icon">★</span>
                                ${producto.rating.toFixed(1)}
                            </span>
                        </div>
                        <p class="product-name">${producto.nombre}</p>
                        <p class="product-price">$${producto.precio} <span>MXN</span></p>
                        <a href="../landing/personaliza.html?id=${producto.id}" class="btn-detail">Ver detalle</a>
                    </div>
                </div>
            `;
        }

        function renderGrid(lista) {
            const grid = document.getElementById('products-grid');
            const count = document.getElementById('result-count');
            grid.innerHTML = lista.map(renderCard).join('');
            count.textContent = `Mostrando ${lista.length} resultados`;
        }

        /* Render inicial con todos los productos */
        renderGrid(productos);

        /* ════════════════════════════════════════
           COLOR DOTS – toggle active
        ════════════════════════════════════════ */
        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.addEventListener('click', () => dot.classList.toggle('active'));
        });

        /* ════════════════════════════════════════
           PRICE RANGE
        ════════════════════════════════════════ */
        const priceDesktop = document.getElementById('price-range-desktop');
        const priceValDesktop = document.getElementById('price-val-desktop');
        if (priceDesktop) {
            priceDesktop.addEventListener('input', () => {
                priceValDesktop.textContent = '$' + priceDesktop.value;
            });
        }

        const priceMobile = document.getElementById('price-range-mobile');
        const priceValMobile = document.getElementById('price-val-mobile');
        if (priceMobile) {
            priceMobile.addEventListener('input', () => {
                priceValMobile.textContent = '$' + priceMobile.value;
            });
        }

        /* ════════════════════════════════════════
           MOBILE DRAWER
        ════════════════════════════════════════ */
        const openBtn   = document.getElementById('open-filters');
        const closeBtn  = document.getElementById('close-filters');
        const drawer    = document.getElementById('filter-drawer');
        const overlay   = document.getElementById('filter-overlay');

        openBtn.addEventListener('click', () => {
            drawer.classList.add('open');
            overlay.classList.add('open');
        });

        function closeDrawer() {
            drawer.classList.remove('open');
            overlay.classList.remove('open');
        }

        closeBtn.addEventListener('click', closeDrawer);
        overlay.addEventListener('click', closeDrawer);
    </script>

</body>
</html>
